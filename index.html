<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Forte, Futuro Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="accessibility-bar">
            <button id="toggle-theme" aria-label="Alternar modo claro e escuro">🌓 Alternar Modo</button>
            <button id="font-decrease" aria-label="Diminuir tamanho da fonte">A-</button>
            <button id="font-increase" aria-label="Aumentar tamanho da fonte">A+</button>
            <button id="toggle-lang" data-lang="pt">Español 🇪🇸</button>
        </div>
        <h1 id="main-title">Agro Forte, Futuro Sustentável</h1>
        <p id="main-subtitle">Equilíbrio entre produção e meio ambiente</p>
    </header>

    <main class="container">
        <section class="robot-section">
            <img src="https://i.ibb.co/6R2MvH2/1000040856.jpg" alt="Robô simpático com chapéu de palha e camisa xadrez" class="robot-img">
            <div class="speech-bubble">
                <p id="robot-text">Olá, amigo! Vamos testar seus conhecimentos sobre a nossa terra?</p>
                <button id="play-audio" class="btn-audio" aria-label="Ouvir texto">🔊 Ouvir</button>
            </div>
        </section>

        <section class="quiz-section">
            <div id="quiz-container">
                <h2 id="question-number">Pergunta 1 de 9</h2>
                <p id="question-text">Carregando pergunta...</p>
                <div id="options-container" class="options-grid"></div>
                <button id="next-btn" class="hidden">Próxima Pergunta</button>
            </div>
            
            <div id="score-container" class="hidden">
                <h2 id="score-title">Fim do Jogo!</h2>
                <p id="score-text"></p>
                <button id="restart-btn">Jogar Novamente</button>
            </div>
        </section>
    </main>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>

    <script src="script.js"></script>
</body>
</html>
